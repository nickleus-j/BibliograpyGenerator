<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Burlywood background -->
    <rect width="400" height="500" fill="burlywood"/>

    <!-- Stack of books (bottom to top) -->

    <!-- Book 1 (bottom) - dark red -->
    <rect x="80" y="320" width="240" height="40" fill="#8B3A3A" stroke="#5C2424" stroke-width="2"/>
    <rect x="80" y="320" width="240" height="8" fill="#A85555" opacity="1"/>

    <!-- Book 2 - dark blue -->
    <rect x="85" y="270" width="230" height="50" fill="#1E3A5F" stroke="#0F1F35" stroke-width="2"/>
    <rect x="85" y="270" width="230" height="10" fill="#3A5F8F" opacity="1"/>

    <!-- Book 3 - dark green -->
    <rect x="90" y="215" width="220" height="55" fill="#2D5A3D" stroke="#1A3A24" stroke-width="2"/>
    <rect x="90" y="215" width="220" height="11" fill="#4A7A5A" opacity="1"/>

    <!-- Open book on top -->
    <g>
        <!-- Left page -->
        <path d="M 100 180 L 100 80 Q 100 70 110 70 L 195 70 L 195 180 Z" fill="#FDF6BD" stroke="#8B7355" stroke-width="2"/>
        <!-- Left page lines (text) -->
        <line x1="115" y1="90" x2="180" y2="90" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="115" y1="105" x2="180" y2="105" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="115" y1="120" x2="180" y2="120" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="115" y1="135" x2="180" y2="135" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="115" y1="160" x2="175" y2="160" stroke="#8B7355" stroke-width="1" opacity="0.5"/>

        <!-- Right page -->
        <path d="M 205 180 L 205 70 L 290 70 Q 300 70 300 80 L 300 180 Z" fill="#FFFACD" stroke="#8B7355" stroke-width="2"/>
        <!-- Right page lines (text) -->
        <line x1="220" y1="90" x2="285" y2="90" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="220" y1="105" x2="285" y2="105" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="220" y1="120" x2="285" y2="120" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="220" y1="135" x2="285" y2="135" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
        <line x1="220" y1="160" x2="280" y2="160" stroke="#8B7355" stroke-width="1" opacity="0.5"/>

        <!-- Spine/center -->
        <line x1="200" y1="70" x2="200" y2="180" stroke="#8B7355" stroke-width="2"/>
    </g>
</svg>
